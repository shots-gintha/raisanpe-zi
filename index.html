<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>礼賛ファンが作ったサイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="loading">
    <!-- 導入演出（スプラッシュスクリーン） -->
    <div id="splash">
        <img src="data/rogo.jpg" alt="礼賛" class="splash-logo">
    </div>

    <nav>
        <ul>
            <li><a href="#top">TOP</a></li>
            <li><a href="#music-video">MUSIC VIDEO</a></li>
            <li><a href="member.html">MEMBER</a></li>
        </ul>
    </nav>
    <div class="haikei" id="top">
        <img src="data/Hyousi.jpg" alt="" class="main-img">
        <h1><img src="data/Rogo.jpg" alt="礼賛" class="logo-img"></h1>
        <div class="main-sns-links">
            <a href="https://www.youtube.com/@raisan_official" target="_blank">YouTube</a>
            <a href="https://twitter.com/raisan_official" target="_blank">X</a>
            <a href="https://www.instagram.com/raisan_official" target="_blank">Instagram</a>
        </div>
    </div>

    <section id="music-video">
    <h2>MUSIC VIDEO</h2>
    <div class="video-grid">
        <!-- 1つ目：誰もしらない -->
        <div class="video-container">
            <iframe src="https://www.youtube-nocookie.com/embed/9Kuu948JIho" title="礼賛 - 誰もしらない" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>
</section>

    <!-- SNS外部スクリプト -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <!-- 導入演出を終了させるスクリプト -->
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.remove('loading');
                document.body.classList.add('loaded');
            }, 2000); // 2秒後に演出を終了
        });
    </script>
</body>
</html>
